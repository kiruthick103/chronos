<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Chronolux | Luxury Watch Boutique — Authenticated Timepieces</title>
    <meta name="description" content="Chronolux — The world's most trusted marketplace for pre-owned and new luxury watches. Shop Rolex, Patek Philippe, Omega and 40+ prestigious brands. Authenticated. Certified. Delivered." />
    <meta name="keywords" content="luxury watches, pre-owned watches, Rolex, Patek Philippe, Omega, Cartier, TAG Heuer, watch boutique, authenticated watches" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://chronolux.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chronolux.com/" />
    <meta property="og:title" content="Chronolux | Luxury Watch Boutique" />
    <meta property="og:description" content="Curated from the world's finest ateliers — each piece a testament to mechanical mastery and timeless design." />
    <meta property="og:image" content="https://chronolux.com/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chronolux | Luxury Watch Boutique" />
    <meta name="twitter:description" content="Shop authenticated luxury timepieces from 40+ prestigious brands." />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Chronolux",
      "description": "Luxury watch boutique offering authenticated pre-owned and new timepieces",
      "url": "https://chronolux.com",
      "logo": "https://chronolux.com/favicon.svg",
      "priceRange": "$$$",
      "currenciesAccepted": "USD",
      "paymentAccepted": "Credit Card, Wire Transfer",
      "openingHours": "Mo-Su 00:00-24:00"
    }
    </script>

    <!-- Error boundary logger to prevent silent blank pages -->
    <script>
      window.addEventListener('error', function(event) {
        var root = document.getElementById('root');
        if (root) {
          root.innerHTML = '<div style="padding: 20px; background: #200d0d; color: #f87171; font-family: monospace; border: 1px solid #7f1d1d; border-radius: 8px; margin: 20px; max-width: 800px; line-height: 1.5;">' +
            '<h3 style="margin-top:0; color: #ef4444; font-size: 18px;">⚠️ Runtime Exception Detected:</h3>' +
            '<p style="font-weight: bold; margin-bottom: 8px;">' + event.message + '</p>' +
            '<pre style="white-space: pre-wrap; background: #180808; padding: 12px; border-radius: 4px; border: 1px solid #991b1b; color: #fca5a5; font-size: 12px; overflow-x: auto;">' + (event.error ? event.error.stack : 'No stack trace available') + '</pre>' +
            '</div>';
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        var root = document.getElementById('root');
        if (root) {
          var errorMsg = event.reason && event.reason.stack ? event.reason.stack : (event.reason ? event.reason.message || event.reason : 'Unknown Promise Rejection');
          root.innerHTML = '<div style="padding: 20px; background: #200d0d; color: #f87171; font-family: monospace; border: 1px solid #7f1d1d; border-radius: 8px; margin: 20px; max-width: 800px; line-height: 1.5;">' +
            '<h3 style="margin-top:0; color: #ef4444; font-size: 18px;">⚠️ Unhandled Promise Rejection:</h3>' +
            '<pre style="white-space: pre-wrap; background: #180808; padding: 12px; border-radius: 4px; border: 1px solid #991b1b; color: #fca5a5; font-size: 12px; overflow-x: auto;">' + errorMsg + '</pre>' +
            '</div>';
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
